<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AceTalk | Bakım Modu</title>
    <link rel="icon" type="image/png" href="icon-192-new.png">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            /* Arka plan ayarları */
            background-image: url('Acetalkwallpaper.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Ubuntu', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Blur ve koyuluk katmanı */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.85); /* Hafif koyu katman */
            backdrop-filter: blur(10px); /* Bulanıklık */
            z-index: 1;
        }

        /* İçeriklerin üstte kalması için */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .box-loader {
            width: 40px;
            height: 40px;
            background: #00aff0;
            margin-bottom: 30px;
            animation: rotateSquare 2s infinite ease-in-out;
        }

        @keyframes rotateSquare {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg); }
        }

        h1 { font-weight: 700; letter-spacing: 2px; margin: 0; font-size: 40px; }
        p { color: #bdc3c7; margin-top: 10px; font-size: 14px; text-align: center; padding: 0 20px; }

        .lang-btns {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        .lang-btn {
            background: rgba(26, 37, 47, 0.6);
            border: 1px solid rgba(52, 73, 94, 0.8);
            color: #ccc;
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Ubuntu', sans-serif;
            transition: 0.3s;
        }

        .lang-btn:hover {
            border-color: #00aff0;
            color: #00aff0;
            background: rgba(26, 37, 47, 0.9);
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="box-loader"></div>
        <h1>AceTalk</h1>
        <p id="status-text">Üzgünüz, Site bakımda olduğu için şu an kullanılamıyor.</p>

        <div class="lang-btns">
            <button class="lang-btn" onclick="changeLang('TR')">TR</button>
            <button class="lang-btn" onclick="changeLang('EN')">EN</button>
        </div>
    </div>

    <script>
        function changeLang(lang) {
            const text = document.getElementById('status-text');
            if (lang === 'EN') {
                text.innerText = "Sorry, the site is currently unavailable due to maintenance.";
            } else {
                text.innerText = "Üzgünüz, Site bakımda olduğu için şu an kullanılamıyor.";
            }
        }
    </script>
</body>
</html>

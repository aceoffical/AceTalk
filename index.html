<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AceTalk | Bakım Modu</title>
    <link rel="icon" type="image/png" href="icon-192-new.png">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'Ubuntu', sans-serif; background: #1a252f; }
        
        #bg { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: url('Acetalkwallpaper.jpg') center/cover; 
            filter: blur(15px) brightness(0.3) saturate(1.5); /* Daha mavimsi ve karanlık */
            z-index: -1; 
        }

        #container { 
            position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: white; pointer-events: none; 
        }

        h1 { font-weight: 700; font-size: 60px; margin: 0; pointer-events: auto; cursor: pointer; transition: transform 0.1s; }
        p { font-weight: 300; font-size: 18px; color: #bdc3c7; pointer-events: auto; }
        
        .shake { animation: shake 0.2s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        #canvas-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="canvas-root"></div>
    
    <div id="container">
        <h1 id="title" onclick="shakeTitle()">AceTalk</h1>
        <p>Üzgünüz, Site bakımda olduğu için şu an kullanılamıyor.</p>
    </div>

    <script>
        function shakeTitle() {
            const title = document.getElementById('title');
            title.classList.add('shake');
            setTimeout(() => title.classList.remove('shake'), 200);
        }

        const { Engine, Render, World, Bodies, Events } = Matter;
        const engine = Engine.create();
        const render = Render.create({
            element: document.getElementById('canvas-root'),
            engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
        });

        // 1 saniyede 1 küp
        setInterval(() => {
            const box = Bodies.rectangle(Math.random() * window.innerWidth, -50, 30, 30, { 
                render: { fillStyle: '#00aff0' },
                restitution: 0.8 
            });
            World.add(engine.world, [box]);
        }, 1000);

        // Küpler aşağı çıkınca yok olsun (birikmesin)
        Events.on(engine, 'afterUpdate', () => {
            engine.world.bodies.forEach(body => {
                if (body.position.y > window.innerHeight + 100) World.remove(engine.world, body);
            });
        });

        Engine.run(engine);
        Render.run(render);
    </script>
</body>
</html>

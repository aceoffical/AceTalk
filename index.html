<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AceTalk | Bakım Modu</title>
    <!-- Logo sadece tarayıcı sekmesinde (favicon) görünür -->
    <link rel="icon" type="image/png" href="icon-192-new.png">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #2c3e50;
            font-family: 'Ubuntu', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Küçük Kare Animasyonu */
        .box-loader {
            width: 40px;
            height: 40px;
            background: #00aff0;
            margin-bottom: 30px;
            animation: rotateSquare 2s infinite ease-in-out;
        }

        @keyframes rotateSquare {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg); }
        }

        /* AceTalk Yazısı Kalın (Bold) */
        h1 { font-weight: 700; letter-spacing: 2px; margin: 0; font-size: 40px; }
        p { color: #7f8c8d; margin-top: 10px; font-size: 14px; text-align: center; padding: 0 20px; }

        .lang-btns {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        .lang-btn {
            background: #1a252f;
            border: 1px solid #34495e;
            color: #ccc;
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Ubuntu', sans-serif;
            transition: 0.3s;
        }

        .lang-btn:hover {
            border-color: #00aff0;
            color: #00aff0;
        }
    </style>
</head>
<body>

    <div class="box-loader"></div>
    <h1>AceTalk</h1>
    <p id="status-text">Üzgünüz, Site bakımda olduğu için şu an kullanılamıyor.</p>

    <div class="lang-btns">
        <button class="lang-btn" onclick="changeLang('TR')">TR</button>
        <button class="lang-btn" onclick="changeLang('EN')">EN</button>
    </div>

    <script>
        function changeLang(lang) {
            const text = document.getElementById('status-text');
            if (lang === 'EN') {
                text.innerText = "Sorry, the site is currently unavailable due to maintenance.";
            } else {
                text.innerText = "Üzgünüz, Site bakımda olduğu için şu an kullanılamıyor.";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AceTalk | Bakım Modu</title>
    <link rel="icon" type="image/png" href="icon-192-new.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: 'Ubuntu', sans-serif; background: #2c3e50; }
        
        /* Arka plan görseli ve blur */
        #bg { position: fixed; top:0; left:0; width:100%; height:100%; background: url('Acetalkwallpaper.jpg') center/cover; filter: blur(10px) brightness(0.4); z-index: -1; }

        #container { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }

        /* Yazı Stilleri */
        h1 { font-weight: 700; font-size: 50px; cursor: pointer; transition: transform 0.1s; margin: 0; }
        .shake { animation: shake 0.2s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        p { font-size: 16px; color: #bdc3c7; }
        #canvas-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div id="canvas-root"></div>
    
    <div id="container">
        <h1 id="title" onclick="shakeTitle()">AceTalk</h1>
        <p>Üzgünüz, Site bakımda olduğu için şu an kullanılamıyor.</p>
    </div>

    <script>
        // 1. Titreşim Efekti
        function shakeTitle() {
            const title = document.getElementById('title');
            title.classList.add('shake');
            setTimeout(() => title.classList.remove('shake'), 200);
        }

        // 2. Fizik Motoru (Matter.js)
        const { Engine, Render, World, Bodies, Body } = Matter;
        const engine = Engine.create();
        const render = Render.create({
            element: document.getElementById('canvas-root'),
            engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
        });

        // Yerçekimi ve zemin
        const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true });
        World.add(engine.world, [ground]);

        // Her 1 saniyede 1 küp düşür
        setInterval(() => {
            const box = Bodies.rectangle(Math.random() * window.innerWidth, -50, 30, 30, { 
                render: { fillStyle: '#00aff0' },
                restitution: 0.6 // Zıplama etkisi
            });
            World.add(engine.world, [box]);
        }, 1000);

        Engine.run(engine);
        Render.run(render);
    </script>
</body>
</html>
